<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senac Wedding - Gestão de Acessos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col">

    <nav class="bg-white shadow-sm border-b border-slate-200 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-ring text-indigo-600 text-2xl"></i>
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Senac <span class="text-indigo-600 italic">Wedding</span></h1>
            </div>
            <div class="hidden md:flex flex-col items-end">
                <span class="text-sm font-bold text-slate-700">Cambará do Sul</span>
                <span class="text-xs text-slate-500">Hotel Conceito • Evento 063</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 flex-grow">
        
        <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Controle de Portaria</h2>
                <p class="text-slate-500 text-sm">Gerencie a entrada de convidados e equipe em tempo real.</p>
            </div>
            <div id="stats" class="flex items-center gap-2 bg-indigo-600 text-white px-4 py-2 rounded-lg shadow-md font-medium transition-all">
                <i class="fa-solid fa-users"></i>
                <span>Carregando...</span>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto max-h-[600px] overflow-y-auto custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-white sticky top-0 z-10 shadow-sm">
                        <tr>
                            <th class="p-4 font-bold text-slate-600 uppercase text-xs tracking-wider border-b border-slate-100">Nome do Participante</th>
                            <th class="p-4 font-bold text-slate-600 uppercase text-xs tracking-wider border-b border-slate-100">Categoria</th>
                            <th class="p-4 font-bold text-slate-600 uppercase text-xs tracking-wider border-b border-slate-100 text-center">Status de Acesso</th>
                        </tr>
                    </thead>
                    <tbody id="guest-list" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 mt-12 py-6">
        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4 text-slate-500 text-sm">
            <div class="flex items-center gap-6">
                <img src="src/img/logo_senac.png" alt="Senac Logo" class="h-6">
                <span>&copy; 2026 - Sistema de Gestão de Casamentos</span>
            </div>
            <div class="flex gap-6">
                <a href="#" class="hover:text-indigo-600 transition-colors">Suporte Técnico</a>
                <a href="#" class="hover:text-indigo-600 transition-colors">Relatórios</a>
                <span class="flex items-center gap-1"><i class="fa-solid fa-location-dot"></i> RS, Brasil</span>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
